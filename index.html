<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h2>Welcome Back</h2>
            <form action="/login-endpoint" method="POST">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" name="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                </div>
                <a href="#" class="forgot-pass">Forgot password?</a>
                <button type="submit" class="btn">Sign In</button>
            </form>
            
            <div class="social-login">
                <button class="social-btn">Continue with Google</button>
            </div>

            <p class="toggle-text">Don't have an account? <a href="#" id="toSignup">Sign Up</a></p>
        </div>

        <!-- SIGN UP FORM -->
        <div id="signupForm" class="hidden">
            <h2>Create Account</h2>
            <form action="/signup-endpoint" method="POST">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" name="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" name="password" required placeholder="Minimum 8 characters">
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>

            <p class="toggle-text">Already have an account? <a href="#" id="toLogin">Sign In</a></p>
        </div>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
